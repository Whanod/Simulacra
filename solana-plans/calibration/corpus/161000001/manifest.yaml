# Hand-filled for Phase 2/3 DLMM parser validation.
# The DLMM (Meteora LbPair) program-accounts fixture committed alongside this
# manifest is SYNTHETIC (no live archival pull) — it's a hand-crafted pair of
# LbPair structs whose `active_id` / `bin_step` fields encode known values so
# the 2.3c-reference DlmmStateHydrator's parser can be verified end-to-end.
# Once 2.4 calibration pulls real archival data this fixture should be
# replaced with a real mainnet DLMM pool snapshot.
#
# Reserve-proxy schema:
#   per LbPair pool, `pool_reserves[pubkey] = [active_id, bin_step]`.
