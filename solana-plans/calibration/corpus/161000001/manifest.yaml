# so the reference hydrator emits the canonical (active_id, bin_step) pair —
# the price state — under the existing `pool_reserves` schema. Future
# iterations that pull the SPL Token vault accounts can swap these for true
# (reserve_x_amount, reserve_y_amount) without changing the manifest layout.

