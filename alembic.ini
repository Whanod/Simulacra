# Alembic config for defi-sim's Postgres schema.
#
# The runtime URL comes from $DATABASE_URL (resolved in alembic/env.py); the
# sqlalchemy.url here stays empty so misconfigured envs fail loudly instead of
# silently writing to a stub DB. To run by hand:
#   DATABASE_URL=postgresql://… alembic upgrade head
#   DATABASE_URL=postgresql://… alembic current
#
# Programmatic invocation from defi_sim_api.backend.db.apply_schema() locates
# this file via DEFI_SIM_REPO_ROOT (set in the Dockerfiles) with a CWD/repo
# fallback for dev + tests.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
