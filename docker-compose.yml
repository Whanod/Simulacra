# defi-sim local stack for agent-driven testing.
#
#   docker compose up -d --build      # boot (first run will build images)
#   docker compose ps                 # wait until both services are "healthy"
#   docker compose logs -f backend    # tail backend
#   docker compose logs -f frontend   # tail frontend
#   docker compose down               # stop and remove containers (keeps postgres volume)
#   docker compose down -v            # stop and wipe the postgres volume too
#
# Host ports:
#   backend  -> http://localhost:8000
#   frontend -> http://localhost:3001   (3000 is held by an unrelated project on this box)
#
# The frontend is a client-side studio, so NEXT_PUBLIC_API_URL is read by the
# browser and must point at the host-visible backend port (8000), not the
# docker-internal service name.

services:
  postgres:
    image: postgres:16-alpine
    container_name: defi-sim-postgres
    environment:
      POSTGRES_USER: defisim
      POSTGRES_PASSWORD: defisim
      POSTGRES_DB: defisim
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defisim -d defisim"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: defi-sim-backend:dev
    container_name: defi-sim-backend
    ports:
      - "8000:8000"
    environment:
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001"
      DEFI_SIM_STORE_BACKEND: "postgres"
      DATABASE_URL: "postgresql://defisim:defisim@postgres:5432/defisim"
      PYTHONUNBUFFERED: "1"
      # Plumbed from repo-root .env via docker compose variable substitution.
      # Unset → backend runs in open mode (no JWT verification).
      PRIVY_APP_ID: "${PRIVY_ID:-}"
      PRIVY_SECRET: "${PRIVY_SECRET:-}"
      DEFI_SIM_API_KEYS: "${DEFI_SIM_API_KEYS:-}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: defi-sim-frontend:dev
    container_name: defi-sim-frontend
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: development
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      # Same Privy app as the backend. Unset → studio runs in open mode.
      NEXT_PUBLIC_PRIVY_APP_ID: "${PRIVY_ID:-}"
      NEXT_PUBLIC_SOLANA_RPC_URL: "${NEXT_PUBLIC_SOLANA_RPC_URL:-https://api.devnet.solana.com}"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 45s
    restart: unless-stopped

volumes:
  postgres-data:
